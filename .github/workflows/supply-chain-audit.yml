name: Supply Chain Audit

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies safely
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Audit npm dependencies
        run: pnpm audit --audit-level moderate

      - name: Check for TanStack dependency drift
        shell: bash
        run: |
          if grep -R "@tanstack/" package.json pnpm-lock.yaml package-lock.json yarn.lock 2>/dev/null; then
            echo "TanStack dependency detected. Verify pinned versions and advisories before merging."
          else
            echo "No TanStack dependency detected."
          fi
